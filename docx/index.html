<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Теория информации</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-w: 280px;
    --bg: #fafafa;
    --sidebar-bg: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #1a73e8;
    --accent-bg: #e8f0fe;
    --hover-bg: #f5f5f5;
    --content-max: 900px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 10;
    transition: transform 0.25s ease;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .sidebar-header:hover { background: var(--hover-bg); }

  .sidebar-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .nav-tree { padding: 8px 0; }

  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    font: inherit;
    cursor: pointer;
    padding: 8px 16px;
    font-size: 14px;
    color: var(--text);
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { background: var(--hover-bg); }
  .nav-item.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  .nav-item.depth-1 { padding-left: 32px; font-size: 13px; }
  .nav-item.depth-2 { padding-left: 48px; font-size: 13px; color: var(--text-muted); }
  .nav-item.depth-3 { padding-left: 64px; font-size: 12px; color: var(--text-muted); }

  /* Main content */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-width: 0;
  }

  .topbar {
    position: sticky;
    top: 0;
    background: rgba(250, 250, 250, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 5;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .breadcrumb a {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }

  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .sep { color: #ccc; margin: 0 2px; }

  .menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 18px;
    margin-right: 8px;
  }

  .content {
    max-width: var(--content-max);
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .content h1 {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 24px 0;
    line-height: 1.3;
  }

  .content h2 {
    font-size: 22px;
    font-weight: 600;
    margin: 28px 0 12px 0;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .content h3 {
    font-size: 18px;
    font-weight: 600;
    margin: 20px 0 8px 0;
  }

  .content h4, .content h5, .content h6 {
    font-size: 15px;
    font-weight: 600;
    margin: 16px 0 6px 0;
  }

  .content p {
    margin: 8px 0 12px;
    font-size: 15px;
    line-height: 1.7;
  }

  .content a {
    color: var(--accent);
    text-decoration: none;
  }

  .content a:hover { text-decoration: underline; }

  .content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 12px 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .content th, .content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }

  .content th {
    background: #f0f0f0;
    font-weight: 600;
  }

  .content tr:nth-child(even) td { background: #fafafa; }
  .content tr:hover td { background: var(--accent-bg); }

  .content ul, .content ol {
    margin: 8px 0 16px;
    padding-left: 24px;
  }

  .content li {
    margin: 4px 0;
    font-size: 15px;
    line-height: 1.6;
  }

  .content blockquote {
    margin: 16px 0;
    padding: 0;
    border: none;
  }

  .content blockquote a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text) !important;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.15s;
    text-decoration: none !important;
  }

  .content blockquote a::before {
    content: "\1F4C4";
    font-size: 20px;
  }

  .content blockquote a:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(26,115,232,0.15);
    color: var(--accent) !important;
  }

  .content blockquote p {
    margin: 0;
  }

  .content code {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  .content pre {
    background: #f0f0f0;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
  }

  .content pre code {
    background: none;
    padding: 0;
  }

  /* Sub-page navigation cards */
  .subpages {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 24px;
  }

  .subpage-card {
    display: block;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }

  .subpage-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(26,115,232,0.15);
    transform: translateY(-1px);
  }

  .subpage-card .card-title {
    font-weight: 500;
    font-size: 14px;
  }

  /* Prev/Next navigation */
  .page-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    gap: 16px;
  }

  .page-nav-btn {
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    max-width: 48%;
  }

  .page-nav-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .page-nav-btn .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .page-nav-btn .title {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }

  .page-nav-btn.next { margin-left: auto; text-align: right; }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open {
      transform: translateX(0);
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }
    .main { margin-left: 0; }
    .menu-btn { display: block; }
    .content { padding: 20px 16px 60px; }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9;
    }
    .overlay.show { display: block; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header" onclick="navigate(defaultPage)">
    <h2>Теория информации</h2>
    <p>Практические задания</p>
  </div>
  <div class="nav-tree" id="navTree"></div>
</nav>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">&#9776;</button>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const PAGES = [{"id":"методические-материалы","title":"Методические материалы","displayName":"Методические материалы","parentId":null},{"id":"практические-задания","title":"Практические задания","displayName":"Практические задания","parentId":null},{"id":"практические-задания_задание-1","title":"Простейшие шифры","displayName":"Задание 1","parentId":"практические-задания"},{"id":"практические-задания_задание-1_варианты-1","title":"Варианты","displayName":"Варианты 1","parentId":"практические-задания_задание-1"},{"id":"практические-задания_задание-1_тесты-1","title":"Содержание тестов","displayName":"Тесты 1","parentId":"практические-задания_задание-1"},{"id":"практические-задания_задание-2","title":"Потоковое шифрование","displayName":"Задание 2","parentId":"практические-задания"},{"id":"практические-задания_задание-2_варианты-2","title":"Варианты 2","displayName":"Варианты 2","parentId":"практические-задания_задание-2"},{"id":"практические-задания_задание-2_пример-lfsr","title":"Пример работы LFSR","displayName":"Пример lfsr","parentId":"практические-задания_задание-2"},{"id":"практические-задания_задание-2_теоретический-материал","title":"Теоретический материал","displayName":"Теоретический материал","parentId":"практические-задания_задание-2"},{"id":"практические-задания_задание-2_условие-задачи","title":"Условие задачи","displayName":"Условие задачи","parentId":"практические-задания_задание-2"},{"id":"практические-задания_задание-3","title":"Криптосистемы с открытым ключом","displayName":"Задание 3","parentId":"практические-задания"},{"id":"практические-задания_задание-3_варианты-3","title":"Варианты 3","displayName":"Варианты 3","parentId":"практические-задания_задание-3"},{"id":"практические-задания_задание-3_примеры-алгоритмов","title":"Примеры работы алгоритмов","displayName":"Примеры алгоритмов","parentId":"практические-задания_задание-3"},{"id":"практические-задания_задание-4","title":"ЭЦП","displayName":"Задание 4","parentId":"практические-задания"},{"id":"практические-задания_задание-4_варианты-4","title":"Варианты 4","displayName":"Варианты 4","parentId":"практические-задания_задание-4"}];
const CONTENT = {"методические-материалы":"<h1>Методические материалы</h1>\n<blockquote>\n<p><a href=\"https://drive.google.com/open?id=1L5VH4mA3FiEBoNb1VF6YsCyckyTBZYEI\">практикум_криптография.pdf</a></p>\n</blockquote>\n","практические-задания":"<h1>Практические задания</h1>\n<p>Данные практические работы являются обязательными к выполнению для допуска к экзамену.</p>\n<p>Максимальная оценка за работу - 9 баллов.</p>\n<p>Система оценки выполненной работы:</p>\n<ul>\n<li>Оценка максимальна, если работа выполнена и сдана в срок, установленный дедлайном.</li>\n<li>После выдачи каждого следующего задания максимальная оценка за предыдущее минус 2 балла т.е. если выдано задание №3, то максимальная оценка за задание №1 - (9 - 4) = 5. Если выдано задание №4, то максимальная оценка за задание №1 - 4 балла.</li>\n</ul>\n<p>Очередь для сдачи практических работ будет формироваться следующим образом:</p>\n<ul>\n<li>Работа должна быть выполнена (полностью работающая программа + отчет) и отправлена накануне аудиторного занятия до 20.00. Работы, отправленные после 20.00, проверяться не будут.</li>\n<li>На адрес <a href=\"mailto:s.boltak@bsuir.by\">s.boltak@bsuir.by</a> необходимо отправить прямую ссылку на репозиторий GitHub с исходным кодом и отчетом. Код не должен быть в архиве. Тема письма - номер группы, номер задания. Например, 451001, лр2. В самом письме обязательно указать ФИО.</li>\n</ul>\n","практические-задания_задание-1":"<h1>Простейшие шифры</h1>\n<p>Затрагиваемые темы:</p>\n<ul>\n<li>Перестановочные алгоритмы шифрования.</li>\n<li>Подстановочные алгоритмы шифрования.</li>\n</ul>\n<p>Изучить теоретический материал <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">практикум_криптография.pdf (стр.4-12)</a>, Виженер_СтолбцУлучш.docx.</p>\n<p><em>Для успешной защиты:</em></p>\n<ul>\n<li>Корректно работающая программа, в которой учтены все требования согласно заданию.</li>\n<li>Отчет в печатном виде.</li>\n<li>Знание теоретического материала по теме работы.</li>\n</ul>\n<p><em>Содержание отчета</em>:</p>\n<ul>\n<li>ФИО, номер группы, номер задания.</li>\n<li>Условие задачи.</li>\n<li><a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-1_%D1%82%D0%B5%D1%81%D1%82%D1%8B-1\">Тесты</a>.</li>\n<li>Скрины, подтверждающие работу программы с файлами.</li>\n</ul>\n","практические-задания_задание-1_варианты-1":"<h1>Варианты</h1>\n<p>Вариант 1.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>метод «железнодорожной изгороди» текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прямой ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 2.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>метод «железнодорожной изгороди»,текст на русском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прогрессивный ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 3.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>«столбцовый метод»с одним ключевым словом, текст на русском языке;</p>\n</li>\n<li><p>алгоритм Виженера, самогенерирующийся ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 4.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>«столбцовый метод»с одним ключевым словом, текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прогрессивный ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 5.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>«столбцовый метод» улучшенный, текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, самогенерирующийся ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 6.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>Метод децимаций текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прямой ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 7.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>метод поворачивающейся решетки (текст на английском языке),использовать размер решетки 4х4 и схему шифрования как в примере на рисунке 1.3 стр.6);</p>\n</li>\n<li><p>алгоритм Виженера, прогрессивный ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 8.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>Метод децимаций текст на русском языке;</p>\n</li>\n<li><p>алгоритм Виженера, самогенерирующийся ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 9.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>Шифр Плейфейра, текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прогрессивный ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 10.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>«столбцовый метод»с двумя ключевыми словами, текст на русском языке;</p>\n</li>\n<li><p>алгоритм Виженера, самогенерирующийся ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n<p>Вариант 11.</p>\n<p>Написать программу, которая выполняет шифрование и дешифрование текстового файла любого размера, содержащего текст на заданном языке, используя следующие алгоритмы шифрования:</p>\n<ul>\n<li><p>Шифр Плейфейра с 4мя шифрующими таблицами, текст на английском языке;</p>\n</li>\n<li><p>алгоритм Виженера, прямой ключ, текст на русском языке.</p>\n</li>\n</ul>\n<p>Для всех алгоритмов ключ задается с клавиатуры пользователем.</p>\n<p>Программа должна игнорировать все символы, не являющиеся буквами заданного алфавита, и шифровать только текст на заданном языке. Все алгоритмы должны быть реализованы в одной программе. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл/ы. Кроме работы с файлами программа должна предоставлять ввод/вывод шифруемого текста с клавиатуры/на экран.</p>\n","практические-задания_задание-1_тесты-1":"<h1>Содержание тестов</h1>\n<p>Назначениетестов-показать, что программа работает корректно при любых условиях, а именно на валидных и не валидных данных.</p>\n<p>Сначала проводится поверхностное тестирование, затем пытаемся ломать программу на валидных и не валидных данных.</p>\n<p>Шрифт тестов должен быть 14 Кг, скрины программы должны быть такими, чтобы можно было не напрягаясь рассмотреть то, что там написано.</p>\n<p>ЧТО ДОЛЖНЫ СОДЕРЖАТЬ ТЕСТЫ</p>\n<p>Железнодорожная изгородь</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Записываем ключ (например, 4).</li>\n<li>Расписываем тестовую фразу в виде изгороди.</li>\n<li>Записываем полученный из изгороди шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании).</li>\n</ul>\n<p>Повторяем все то же самое для ключа с нечетным значением.</p>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для крайних значений ключа</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для ключа, содержащего недопустимые значения.</p>\n<p>Столбцовый метод</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Записываем ключевое слово.</li>\n<li>Составляем таблицу, используя ключ и тестовую фразу.</li>\n<li>Записываем полученный из таблицы шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании)</li>\n</ul>\n<p>Рассматриваем два варианта - когда тестовая фраза заполняет полностью строчки таблицы и когда последняя строка тестовой фразы заполнена не полностью.</p>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для крайних значений ключа</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для ключа, содержащего недопустимые значения.</p>\n<p>Поворачивающаяся решётка</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Изображаем решетку с отверстиями, в которые будут заноситься символы исходного текста.</li>\n<li>Изображаем шифрование по шагам (четыре поворота решетки).</li>\n<li>Записываем полученный из решетки шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании)</li>\n</ul>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для разных размеров решетки.</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для файлов с разным содержимым (пустой и .т.д)</p>\n<p>Шифр Плейфера</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Записываем ключевое слово.</li>\n<li>Составляем таблицу, по которой будем шифровать</li>\n<li>Делаем все необходимые преобразования с тестовой фразой.</li>\n<li>Записываем полученный с помощью таблицы шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании)</li>\n</ul>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для разных ситуаций.</p>\n<p>Рассматриваем ситуацию, когда шифруемый текст четной длины и когда текст не четной длины. Также необходимо показать, как будет работать программа, если подряд идут две одинаковые буквы.</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для ситуаций, которые могут вызвать коллизию (например, если встречаются подряд несколько букв х).</p>\n<p>Метод децимаций</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Записываем ключевое слово.</li>\n<li>Составляем таблицу, которая будет содержать весь алфавит заданного языка и номер каждой буквы.</li>\n<li>Записываем все выполняемые при шифровании вычисления.</li>\n<li>Записываем полученный с помощью таблицы и формулы шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании).</li>\n</ul>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для разных значений ключа: ключ меньше длины алфавита и ключ больше длины алфавита.</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для ключа, содержащего недопустимые значения</p>\n<p>Шифр Виженера</p>\n<p><em>Дымовое тестирование: Показываем, что программа работает.</em></p>\n<ul>\n<li>Записываем тестовую фразу на заданном языке, которая содержит недопустимые символы.</li>\n<li>Записываем ключевое слово.</li>\n<li>Записываем тестовую фразу, а под ней ключевое слово, повторяющееся столько раз, сколько необходимо.</li>\n<li>Составляем таблицу подстановки.</li>\n<li>Записываем полученный с помощью таблицы шифротекст.</li>\n<li>Вставляем скрин с результатами работы программы (при шифровании и при дешифровании)</li>\n</ul>\n<p><em>Ломаем на валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для тестовой фразы, содержащей букву Ё.</p>\n<p><em>Ломаем на не валидных данных:</em></p>\n<p>Все вышеизложенное проделываем для ключа, содержащего недопустимые значения</p>\n","практические-задания_задание-2":"<h1>Потоковое шифрование</h1>\n<p>Затрагиваемые темы:</p>\n<ul>\n<li>Потоковые криптосистемы.</li>\n<li>Генераторы ключей на основе сдвиговых регистров с линейной обратной связью.</li>\n<li>Примитивный многочлен.</li>\n</ul>\n<p>Изучить теоретический материал <a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-2_%D1%82%D0%B5%D0%BE%D1%80%D0%B5%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB\">теория_задание№2.docx</a>.</p>\n<p>Выполнить задание согласно выданному <a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-2_%D0%B2%D0%B0%D1%80%D0%B8%D0%B0%D0%BD%D1%82%D1%8B-2\">варианту</a>.</p>\n<p><em>Для успешной защиты</em>:</p>\n<ul>\n<li>Корректно работающая программа, в которой учтены все требования согласно заданию.</li>\n<li>Отчет в печатном виде.</li>\n<li>Тестовые файлы.</li>\n<li>Знание теоретического материала по теме работы.</li>\n</ul>\n<p><em>Содержание отчета</em>:</p>\n<ul>\n<li>ФИО, номер группы, номер задания.</li>\n<li>Условие задачи.</li>\n<li><a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-2_%D0%BF%D1%80%D0%B8%D0%BC%D0%B5%D1%80-lfsr\">Пример работы LFSR по тактам</a> согласно выданного варианта (тактов д.б. не менее 60ти ).</li>\n<li>Скрины, подтверждающие корректную работу программы.</li>\n</ul>\n","практические-задания_задание-2_варианты-2":"<h1>Варианты 2</h1>\n<table>\n<thead>\n<tr>\n<th>Номер варианта</th>\n<th>Степень многочлена</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1</td>\n<td>23</td>\n</tr>\n<tr>\n<td>2</td>\n<td>24</td>\n</tr>\n<tr>\n<td>3</td>\n<td>25</td>\n</tr>\n<tr>\n<td>4</td>\n<td>26</td>\n</tr>\n<tr>\n<td>5</td>\n<td>27</td>\n</tr>\n<tr>\n<td>6</td>\n<td>28</td>\n</tr>\n<tr>\n<td>7</td>\n<td>29</td>\n</tr>\n<tr>\n<td>8</td>\n<td>30</td>\n</tr>\n<tr>\n<td>9</td>\n<td>31</td>\n</tr>\n<tr>\n<td>10</td>\n<td>32</td>\n</tr>\n<tr>\n<td>11</td>\n<td>33</td>\n</tr>\n<tr>\n<td>12</td>\n<td>34</td>\n</tr>\n<tr>\n<td>13</td>\n<td>35</td>\n</tr>\n<tr>\n<td>14</td>\n<td>36</td>\n</tr>\n<tr>\n<td>15</td>\n<td>37</td>\n</tr>\n<tr>\n<td>16</td>\n<td>38</td>\n</tr>\n<tr>\n<td>17</td>\n<td>39</td>\n</tr>\n<tr>\n<td>18</td>\n<td>40</td>\n</tr>\n</tbody></table>\n","практические-задания_задание-2_пример-lfsr":"<h1>Пример работы LFSR</h1>\n<blockquote>\n<p><a href=\"https://drive.google.com/open?id=1ZdfMWBWNXMXHdnpSWB7moRH5a1qtpw4e\">Пример составления теста для лр2.xlsx</a></p>\n</blockquote>\n","практические-задания_задание-2_теоретический-материал":"<h1>Теоретический материал</h1>\n<blockquote>\n<p><a href=\"https://drive.google.com/open?id=1yHIglqT2IUoiNrR3NaeCXOJjEhl5MCyw\">теория_задание№2.docx</a></p>\n</blockquote>\n","практические-задания_задание-2_условие-задачи":"<h1>Условие задачи</h1>\n<p>Условие задачи</p>\n<p>Реализовать систему потокового шифрования и дешифрования для файла с любым содержимым (с любым расширением) с помощью генератора ключевой последовательности на основе линейного сдвигового регистра с обратной связью LFSR(размерность регистра согласно выданному <a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-2_%D0%B2%D0%B0%D1%80%D0%B8%D0%B0%D0%BD%D1%82%D1%8B-2\">варианту</a>. Начальное состояние регистра ввести с клавиатуры. Поле для ввода состояния регистра должно игнорировать любые символы кроме 0 и 1. Вывести на экран сгенерированный ключ (последовательность из 0 и 1), исходный файл и зашифрованный файл в двоичном виде. На диск сохранить зашифрованный/расшифрованный файл в виде потока байтов. Программа не должна быть написана в консольном режиме. Результат работы программы – зашифрованный/расшифрованный файл.</p>\n","практические-задания_задание-3":"<h1>Криптосистемы с открытым ключом</h1>\n<p>Затрагиваемые темы:</p>\n<ul>\n<li>Криптосистема RSA.</li>\n<li>Криптосистема Рабина.</li>\n<li>Криптосистема Эль-Гамаля.</li>\n</ul>\n<p>Изучить теоретический материал <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">практикум_криптография.pdf, стр.14-20</a>.</p>\n<p>Выполнить задание согласно выданному <a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-3_%D0%B2%D0%B0%D1%80%D0%B8%D0%B0%D0%BD%D1%82%D1%8B-3\">варианту</a>.</p>\n<p><em>Для успешной защиты</em>:</p>\n<ul>\n<li>Корректно работающая программа, в которой учтены все требования согласно заданию.</li>\n<li>Отчет в печатном виде.</li>\n<li>Тестовые файлы.</li>\n<li>Знание теоретического материала по теме работы.</li>\n</ul>\n<p><em>Содержание отчета</em>:</p>\n<ul>\n<li>ФИО, номер группы, номер задания.</li>\n<li>Условие задачи.</li>\n<li>Показать работу трех алгоритмов (быстрое возведение в степень, поиск первообразных корней, расширенный алгоритм Евклида) согласно <a href=\"#%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F_%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D0%B5-3_%D0%BF%D1%80%D0%B8%D0%BC%D0%B5%D1%80%D1%8B-%D0%B0%D0%BB%D0%B3%D0%BE%D1%80%D0%B8%D1%82%D0%BC%D0%BE%D0%B2\">примеру</a>. Числа, выбранные для иллюстрации работы алгоритмов у всех студентов должны быть уникальны.</li>\n<li>Скрины, подтверждающие корректную работу программы.</li>\n</ul>\n","практические-задания_задание-3_варианты-3":"<h1>Варианты 3</h1>\n<p>Вариант 1</p>\n<p>Разработать программное средство, выполняющее вычисление открытого ключа (<em>KO</em>) алгоритма <em>RSA</em> и побайтовое шифрование данным ключом по алгоритму<em>RSA</em> произвольного файла (с любым расширением). Значения параметров <em>p,q</em> и <em>KС</em>, а также имя входного файла задаются пользователем. Программа должна осуществлять проверку ограничений на вводимые пользователем значения параметров алгоритма. Организовать вывод содержимого зашифрованного файла (сохраненного на диске в виде потока байтов) на экран в виде чисел в 10 системе счисления.</p>\n<p>Разработать программное средство, выполняющее расшифрование файла, каждый 16-битный блок которого представляет собой зашифрованное по алгоритму <em>RSA</em> 8-битное значение. Значения модуля <em>r</em> и <em>закрытого</em> ключа <em>KС</em>задаются пользователем.</p>\n<p>Использовать алгоритм быстрого возведения в степень и расширенный алгоритм Евклида.</p>\n<p>Результат работы программы – зашифрованный/расшифрованный файл/ы.</p>\n<p>Вариант 2</p>\n<p>Реализовать шифратор и дешифратор <em>алгоритмаЭль-Гамаля</em> файла c произвольным содержимым (с любым расширением), используя алгоритм быстрого возведения в степень, а также реализовать вычисление открытого ключа <em>g</em> при данном значении <em>p</em>, используя алгоритм нахождения первообразного корня по модулю (искать все первообразные корни для заданного р). Значения параметров <em>p</em>,<em>x</em> и <em>k</em>задаются пользователем. Программа должна осуществлять проверку ограничений на вводимые пользователем значения параметров алгоритма. Организовать вывод содержимого зашифрованного файла (сохраненного на диске в виде потока байтов) на экран в виде чисел в 10-й системе счисления. Результат работы программы – зашифрованный/расшифрованный файл/ы.</p>\n<p>Используя алгоритм из методички, искать все первообразные корни по модулю *p.*Все найденные корни вывести на экран и предложить для шифрования ввести на выбор любой из найденных.</p>\n<p>Вариант 3</p>\n<p>Реализовать шифратор и дешифратор по алгоритму <em>Рабина</em> (алгоритм из <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">методички</a> файла с любым содержимым (любым расширением), используя расширенный алгоритм Евклида и алгоритм быстрого возведения в степень при дешифрации. Значения параметров <em>p, q</em>и<em>b</em>задаются пользователем. Программа должна осуществлять проверку ограничений на вводимые пользователем значения параметров. Организовать вывод содержимого зашифрованного файла (сохраненного на диске в виде потока байтов) на экран в виде чисел в 10-й системе счисления. Результат работы программы – зашифрованный/расшифрованный файл/ы.</p>\n","практические-задания_задание-3_примеры-алгоритмов":"<h1>Примеры работы алгоритмов</h1>\n<blockquote>\n<p><a href=\"https://drive.google.com/open?id=1dkJSI0RO8HMXGXIl204r_bOwZFfM3Wxc\">Примеры алгоритмов 3.docx</a></p>\n</blockquote>\n","практические-задания_задание-4":"<h1>ЭЦП</h1>\n<p>Затрагиваемые темы:</p>\n<ul>\n<li>Понятие хеш-функции.</li>\n<li>Алгоритм цифровой подписи RSA.</li>\n<li>Алгоритм цифровой подписи DSA</li>\n</ul>\n<p>Изучить теоретический материал <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">практикум_криптография.pdf, стр.22-27</a>.</p>\n<p><em>Для успешной защиты</em>:</p>\n<ul>\n<li>Корректно работающая программа, в которой учтены все требования согласно заданию.</li>\n<li>Отчет в электронном виде.</li>\n<li>Тестовые файлы.</li>\n<li>Знание теоретического материала по теме работы.</li>\n</ul>\n<p><em>Содержание отчета</em>:</p>\n<ul>\n<li>ФИО, номер группы, номер задания.</li>\n<li>Условие задачи.</li>\n<li>Скрины, подтверждающие корректную работу программы.</li>\n</ul>\n","практические-задания_задание-4_варианты-4":"<h1>Варианты 4</h1>\n<p>Вариант 1</p>\n<p>Реализовать программное средство, выполняющее вычисление и проверку электронной цифровой подписи (ЭЦП) текстового файла на базе алгоритма RSA. Для вычисления хеш-образа сообщения использовать функцию 3.2 из <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">методических материалов (стр.22</a>, Н0=100). Числа <em>p</em>и<em>q</em>, а также закрытый ключ ввести с клавиатуры. Произвести все необходимые проверки для параметров, вводимых с клавиатуры. В отдельное поле вывести полученный хеш сообщения в 10 с/cч. ЭЦП вывести как целое число. Сформировать новое сообщение, состоящее из исходного сообщения и добавленной к нему цифровой подписи в виде числа в десятичной системе счисления. Цифровую подпись добавлять в конец файла. При проверке ЭЦП предусмотреть возможность выбора файла для проверки.</p>\n<p>На экран вывести результат проверки:</p>\n<ul>\n<li>Сообщение о том верна подпись или нет.</li>\n<li>Вычисленные при проверке значения.</li>\n</ul>\n<p>Для возведения в степень использовать быстрый алгоритм возведения в степень по модулю.</p>\n<p>Вариант 2</p>\n<p>Реализовать программное средство, выполняющее вычисление и проверку электронной цифровой подписи (ЭЦП) текстового файла на базе алгоритма DSA. Для вычисления хеш-образа сообщения использовать функцию 3.2 из <a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">методических материалов</a> (<a href=\"#%D0%BC%D0%B5%D1%82%D0%BE%D0%B4%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B5-%D0%BC%D0%B0%D1%82%D0%B5%D1%80%D0%B8%D0%B0%D0%BB%D1%8B\">стр.22, Н0=100</a>. Вычисления функции необходимо выполнять по модулю числа <em>q</em>. Числа <em>q, p, h, x</em>и<em>k</em> ввести с клавиатуры. Произвести все необходимые проверки для параметров, вводимых с клавиатуры. В отдельное поле вывести полученный хеш сообщения в 10 с/cч. ЭЦП вывести как два целых числа (если одно из полученных значений <em>r</em> или<em>s</em> будет равно 0, то необходимо повторить вычисления для другого значения <em>k</em> для чего предложить повторно ввести <em>k</em> с клавиатуры). Сформировать новое сообщение, состоящее из исходного сообщения и добавленной к нему цифровой подписи в виде числа в десятичной системе счисления. Цифровую подпись добавлять в конец файла. При проверке ЭЦП предусмотреть возможность выбора файла для проверки.</p>\n<p>На экран вывести результат проверки:</p>\n<ul>\n<li>Сообщение о том верна подпись или нет.</li>\n<li>Вычисленные при проверке значения.</li>\n</ul>\n<p>Для возведения в степень использовать быстрый алгоритм возведения в степень по модулю.</p>\n<p>При нахождении обратного элемента <em>s−1mod q</em>или <em>k−1mod q</em>использовать <em>малую теорему Ферма</em> в виде: <em>s−1mod q= sq-2mod q</em></p>\n"};

const pageMap = {};
PAGES.forEach(p => { pageMap[p.id] = p; });

// Build children map
const childrenMap = {};
PAGES.forEach(p => {
  if (!childrenMap[p.id]) childrenMap[p.id] = [];
  if (p.parentId && pageMap[p.parentId]) {
    if (!childrenMap[p.parentId]) childrenMap[p.parentId] = [];
    childrenMap[p.parentId].push(p);
  }
});

// Flat ordered list for prev/next
const flatOrder = PAGES.map(p => p.id);

function getDepth(page) {
  let d = 0, p = page;
  while (p.parentId && pageMap[p.parentId]) { d++; p = pageMap[p.parentId]; }
  return d;
}

function getBreadcrumbs(pageId) {
  const crumbs = [];
  let p = pageMap[pageId];
  while (p) {
    crumbs.unshift(p);
    p = p.parentId ? pageMap[p.parentId] : null;
  }
  return crumbs;
}

// Render sidebar
function renderNav() {
  const nav = document.getElementById("navTree");
  let html = "";
  PAGES.forEach(p => {
    const depth = getDepth(p);
    html += '<button class="nav-item depth-' + depth + '" data-id="' + p.id + '" onclick="navigate(\'' + p.id + '\')">' + p.displayName + '</button>';
  });
  nav.innerHTML = html;
}

// Render page
let currentPage = null;
function navigate(pageId, skipHash) {
  const page = pageMap[pageId];
  if (!page) return;
  if (pageId === currentPage) return;
  currentPage = pageId;

  // Update hash (skip when called from hashchange to avoid re-trigger)
  if (!skipHash) location.hash = pageId;

  // Update active nav
  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === pageId);
  });

  // Scroll nav item into view
  const activeNav = document.querySelector('.nav-item.active');
  if (activeNav) activeNav.scrollIntoView({ block: "nearest" });

  // Breadcrumbs
  const crumbs = getBreadcrumbs(pageId);
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = crumbs.map((c, i) => {
    if (i === crumbs.length - 1) return '<span>' + c.displayName + '</span>';
    return '<a onclick="navigate(\'' + c.id + '\')">' + c.displayName + '</a><span class="sep">/</span>';
  }).join("");

  // Content
  let html = CONTENT[pageId] || "<p>No content</p>";

  // Add sub-page cards
  const children = childrenMap[pageId] || [];
  if (children.length > 0) {
    html += '<div class="subpages">';
    children.forEach(c => {
      html += '<div class="subpage-card" onclick="navigate(\'' + c.id + '\')">' +
        '<div class="card-title">' + c.displayName + '</div></div>';
    });
    html += '</div>';
  }

  // Prev/Next
  const idx = flatOrder.indexOf(pageId);
  html += '<div class="page-nav">';
  if (idx > 0) {
    const prev = pageMap[flatOrder[idx - 1]];
    html += '<div class="page-nav-btn prev" onclick="navigate(\'' + prev.id + '\')">' +
      '<span class="label">&larr; Назад</span><span class="title">' + prev.displayName + '</span></div>';
  }
  if (idx < flatOrder.length - 1) {
    const next = pageMap[flatOrder[idx + 1]];
    html += '<div class="page-nav-btn next" onclick="navigate(\'' + next.id + '\')">' +
      '<span class="label">Далее &rarr;</span><span class="title">' + next.displayName + '</span></div>';
  }
  html += '</div>';

  document.getElementById("content").innerHTML = html;
  window.scrollTo(0, 0);

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  }
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

// Init
renderNav();
const defaultPage = 'практические-задания';
const initialPage = location.hash ? decodeURIComponent(location.hash.slice(1)) : defaultPage;
navigate(initialPage, true);

window.addEventListener("hashchange", () => {
  const pageId = location.hash ? decodeURIComponent(location.hash.slice(1)) : defaultPage;
  navigate(pageId, true);
});

// Intercept clicks on internal hash links in content
document.getElementById("content").addEventListener("click", (e) => {
  const a = e.target.closest("a[href^='#']");
  if (a) {
    const pageId = a.getAttribute("href").slice(1);
    if (pageMap[pageId]) {
      e.preventDefault();
      navigate(pageId);
    }
  }
});

// Keyboard: left/right arrows for prev/next
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  const idx = flatOrder.indexOf(decodeURIComponent(location.hash.slice(1)));
  if (e.key === "ArrowLeft" && idx > 0) { e.preventDefault(); navigate(flatOrder[idx - 1]); }
  if (e.key === "ArrowRight" && idx < flatOrder.length - 1) { e.preventDefault(); navigate(flatOrder[idx + 1]); }
});
</script>
